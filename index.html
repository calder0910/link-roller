<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkRoll — Random URL Picker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
    --accent: #c8f135; --accent2: #ff4f4f; --text: #e8e8e8;
    --muted: #666; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 20px; }
  header { text-align: center; margin-bottom: 40px; }
  .logo { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: clamp(32px, 6vw, 52px); font-weight: 700; color: #fff; line-height: 1.1; }
  h1 span { color: var(--accent); }
  .sub { margin-top: 10px; color: var(--muted); font-size: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 640px; margin-bottom: 20px; text-align: center; }

  /* Loading state */
  .load-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .big-spinner { width: 40px; height: 40px; border: 3px solid rgba(200,241,53,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); }
  .load-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); margin-top: 4px; }

  /* Result */
  .result-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; }
  .result-wrap.visible { display: flex; }
  .roll-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
  .result-url { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent); word-break: break-all; line-height: 1.7; padding: 20px; background: var(--bg); border: 1.5px solid var(--accent); border-radius: 8px; width: 100%; text-align: left; }
  .btn-row { display: flex; gap: 10px; width: 100%; }
  button { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  button:active { transform: scale(0.97); }
  .btn-copy, .btn-open { flex: 1; padding: 11px; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); font-size: 13px; border-radius: 7px; }
  .btn-copy:hover, .btn-open:hover { border-color: var(--accent); color: var(--accent); }
  .btn-roll { width: 100%; padding: 16px; background: var(--accent); color: #0f0f0f; font-size: 18px; letter-spacing: 0.02em; border-radius: 10px; }
  .btn-roll:hover { opacity: 0.9; }

  /* Error */
  .error-wrap { display: none; flex-direction: column; align-items: center; gap: 12px; }
  .error-wrap.visible { display: flex; }
  .error-msg { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent2); }

  /* Stats bar */
  .stats { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .stats span { color: var(--accent); }

  /* History */
  .history-card { display: none; }
  .history-card.visible { display: block; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .history-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
  .btn-clear { font-size: 11px; padding: 4px 10px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; font-family: 'JetBrains Mono', monospace; }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .history-item { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #888; padding: 8px 12px; background: var(--bg); border-radius: 6px; border: 1px solid transparent; word-break: break-all; line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .history-item a { color: #888; text-decoration: none; flex: 1; }
  .history-item a:hover { color: var(--accent); }
  .history-num { color: var(--border); font-size: 10px; flex-shrink: 0; margin-top: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">// LinkRoll</div>
  <h1>Random <span>URL</span> Roller</h1>
  <p class="sub">103K+ URLs · One click · Instant random pick</p>
</header>

<div class="card" id="mainCard">
  <!-- Loading -->
  <div class="load-wrap" id="loadWrap">
    <div class="big-spinner"></div>
    <div>
      <div class="load-text">Loading URL database...</div>
      <div class="load-count" id="loadCount"></div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-wrap" id="resultWrap">
    <div class="roll-num" id="rollNum">Roll #1</div>
    <div class="result-url" id="resultUrl"></div>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyUrl()">Copy URL</button>
      <button class="btn-open" onclick="openUrl()">Open ↗</button>
    </div>
    <button class="btn-roll" onclick="rollRandom()">🎲 Roll Again</button>
    <div class="stats" id="stats"></div>
  </div>

  <!-- Error -->
  <div class="error-wrap" id="errorWrap">
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-roll" style="width:auto;padding:12px 28px;font-size:14px" onclick="loadUrls()">Retry</button>
  </div>
</div>

<!-- History -->
<div class="card history-card" id="historyCard">
  <div class="history-header">
    <span class="history-title">Roll History</span>
    <button class="btn-clear" onclick="clearHistory()">Clear</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  const RAW_URL = 'https://raw.githubusercontent.com/calder0910/link-roller/main/all_urls_threads.txt';

  let urls = [];
  let rollCount = 0;
  let history = [];
  let currentUrl = '';

  async function loadUrls() {
    showState('loading');
    document.getElementById('loadCount').textContent = '';

    try {
      const res = await fetch(RAW_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status} — pastiin file udah di-upload ke repo`);

      // Stream-read with progress
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let text = '';
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        text += decoder.decode(value, { stream: true });
        received += value.length;
        document.getElementById('loadCount').textContent =
          `${(received / 1024 / 1024).toFixed(1)} MB loaded...`;
      }

      urls = text.split('\n').map(u => u.trim()).filter(u => u.length > 0 && u.startsWith('http'));

      if (urls.length === 0) throw new Error('File kosong atau format tidak dikenali');

      showState('result');
      rollRandom();

    } catch (e) {
      showError(e.message);
    }
  }

  function rollRandom() {
    if (!urls.length) return;
    rollCount++;
    const idx = Math.floor(Math.random() * urls.length);
    currentUrl = urls[idx];

    document.getElementById('rollNum').textContent = `Roll #${rollCount}`;
    document.getElementById('resultUrl').textContent = currentUrl;
    document.getElementById('stats').innerHTML =
      `picked #<span>${(idx+1).toLocaleString()}</span> of <span>${urls.length.toLocaleString()}</span> URLs`;

    addHistory(currentUrl, rollCount);
  }

  function addHistory(url, num) {
    history.unshift({ url, num });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const card = document.getElementById('historyCard');
    const list = document.getElementById('historyList');
    if (history.length === 0) { card.classList.remove('visible'); return; }
    card.classList.add('visible');
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <a href="${h.url}" target="_blank">${h.url}</a>
        <span class="history-num">#${h.num}</span>
      </div>
    `).join('');
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  function copyUrl() {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy URL', 1500);
    });
  }

  function openUrl() {
    if (currentUrl) window.open(currentUrl, '_blank');
  }

  function showState(state) {
    document.getElementById('loadWrap').style.display = state === 'loading' ? 'flex' : 'none';
    document.getElementById('resultWrap').classList.toggle('visible', state === 'result');
    document.getElementById('errorWrap').classList.toggle('visible', state === 'error');
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = '❌ ' + msg;
    showState('error');
  }

  // Auto-load on start
  loadUrls();
</script>
</body>
</html>
