<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkRoll — Random URL Picker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
    --accent: #c8f135; --accent2: #ff4f4f; --text: #e8e8e8;
    --muted: #666; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 20px; }
  header { text-align: center; margin-bottom: 40px; }
  .logo { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 700; color: #fff; line-height: 1.1; }
  h1 span { color: var(--accent); }
  .sub { margin-top: 10px; color: var(--muted); font-size: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 640px; margin-bottom: 20px; }

  /* Loading */
  .load-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
  .big-spinner { width: 40px; height: 40px; border: 3px solid rgba(200,241,53,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); }
  .load-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); margin-top: 4px; text-align: center; }

  /* Filter card */
  .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .filter-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
  .filter-actions { display: flex; gap: 8px; }
  .btn-sm { font-size: 11px; padding: 4px 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--accent2); color: var(--accent2); }

  .domain-list { display: flex; flex-direction: column; gap: 6px; }
  .domain-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg); border-radius: 7px; border: 1px solid transparent; cursor: pointer; transition: border-color 0.15s; }
  .domain-item:hover { border-color: var(--border); }
  .domain-item.active { border-color: rgba(200,241,53,0.3); background: rgba(200,241,53,0.03); }
  .domain-item input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
  .domain-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); flex: 1; }
  .domain-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .domain-count span { color: var(--accent); }

  .filter-summary { margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; }
  .filter-summary span { color: var(--accent); }

  /* Result */
  .result-section { display: none; }
  .result-section.visible { display: block; }
  .roll-num { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .result-url { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent); word-break: break-all; line-height: 1.7; padding: 18px; background: var(--bg); border: 1.5px solid var(--accent); border-radius: 8px; margin-bottom: 12px; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 12px; }
  button { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  button:active { transform: scale(0.97); }
  .btn-copy, .btn-open { flex: 1; padding: 11px; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); font-size: 13px; border-radius: 7px; }
  .btn-copy:hover, .btn-open:hover { border-color: var(--accent); color: var(--accent); }
  .btn-roll { width: 100%; padding: 16px; background: var(--accent); color: #0f0f0f; font-size: 18px; letter-spacing: 0.02em; border-radius: 10px; }
  .btn-roll:hover { opacity: 0.9; }
  .btn-roll:disabled { opacity: 0.35; cursor: not-allowed; }
  .stats { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; }
  .stats span { color: var(--accent); }

  /* Error */
  .error-wrap { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; }
  .error-wrap.visible { display: flex; }
  .error-msg { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent2); text-align: center; line-height: 1.6; }

  /* History */
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .history-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .history-item { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #888; padding: 8px 12px; background: var(--bg); border-radius: 6px; word-break: break-all; line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .history-item a { color: #888; text-decoration: none; flex: 1; }
  .history-item a:hover { color: var(--accent); }
  .history-num { color: var(--border); font-size: 10px; flex-shrink: 0; margin-top: 2px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">// LinkRoll</div>
  <h1>Random <span>URL</span> Roller</h1>
  <p class="sub">103K+ URLs · Filter by domain · Instant random pick</p>
</header>

<!-- Loading -->
<div class="card" id="loadCard">
  <div class="load-wrap">
    <div class="big-spinner"></div>
    <div>
      <div class="load-text">Loading URL database...</div>
      <div class="load-count" id="loadCount"></div>
    </div>
  </div>
</div>

<!-- Error -->
<div class="card hidden" id="errorCard">
  <div class="error-wrap visible">
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-roll" style="width:auto;padding:12px 28px;font-size:14px" onclick="loadUrls()">Retry</button>
  </div>
</div>

<!-- Filter by domain -->
<div class="card hidden" id="filterCard">
  <div class="filter-header">
    <span class="filter-title">Filter by Domain</span>
    <div class="filter-actions">
      <button class="btn-sm" onclick="selectAll()">All</button>
      <button class="btn-sm danger" onclick="selectNone()">None</button>
    </div>
  </div>
  <div class="domain-list" id="domainList"></div>
  <div class="filter-summary" id="filterSummary"></div>
</div>

<!-- Result -->
<div class="card hidden" id="resultCard">
  <div class="result-section visible">
    <div class="roll-num" id="rollNum">Roll #1</div>
    <div class="result-url" id="resultUrl"></div>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyUrl()">Copy URL</button>
      <button class="btn-open" onclick="openUrl()">Open ↗</button>
    </div>
    <button class="btn-roll" id="rollBtn" onclick="rollRandom()">🎲 Roll Again</button>
    <div class="stats" id="stats"></div>
  </div>
</div>

<!-- History -->
<div class="card hidden" id="historyCard">
  <div class="history-header">
    <span class="history-title">Roll History</span>
    <button class="btn-sm danger" onclick="clearHistory()">Clear</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  const RAW_URL = 'https://raw.githubusercontent.com/calder0910/link-roller/main/all_urls_threads.txt';

  let allUrls = [];
  let filteredUrls = [];
  let domainMap = {}; // domain -> [urls]
  let enabledDomains = new Set();
  let rollCount = 0;
  let history = [];
  let currentUrl = '';

  async function loadUrls() {
    show('loadCard');
    hide('errorCard'); hide('filterCard'); hide('resultCard'); hide('historyCard');

    try {
      const res = await fetch(RAW_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status} — pastiin file udah di-upload ke repo`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let text = '';
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        text += decoder.decode(value, { stream: true });
        received += value.length;
        document.getElementById('loadCount').textContent =
          `${(received / 1024 / 1024).toFixed(1)} MB loaded...`;
      }

      allUrls = text.split('\n').map(u => u.trim()).filter(u => u.startsWith('http'));
      if (allUrls.length === 0) throw new Error('File kosong atau format tidak dikenali');

      buildDomainMap();
      hide('loadCard');
      renderDomains();
      show('filterCard');
      show('resultCard');
      updateFiltered();
      rollRandom();

    } catch (e) {
      hide('loadCard');
      document.getElementById('errorMsg').textContent = '❌ ' + e.message;
      show('errorCard');
    }
  }

  function buildDomainMap() {
    domainMap = {};
    allUrls.forEach(url => {
      try {
        const domain = new URL(url).hostname.replace(/^www\./, '');
        if (!domainMap[domain]) domainMap[domain] = [];
        domainMap[domain].push(url);
      } catch (_) {}
    });
    // Default: semua enabled
    enabledDomains = new Set(Object.keys(domainMap));
  }

  function renderDomains() {
    const list = document.getElementById('domainList');
    const domains = Object.keys(domainMap).sort((a, b) => domainMap[b].length - domainMap[a].length);

    list.innerHTML = domains.map(domain => {
      const count = domainMap[domain].length;
      const checked = enabledDomains.has(domain) ? 'checked' : '';
      return `
        <label class="domain-item ${checked ? 'active' : ''}" id="label-${CSS.escape(domain)}">
          <input type="checkbox" ${checked} onchange="toggleDomain('${domain}', this)">
          <span class="domain-name">${domain}</span>
          <span class="domain-count"><span>${count.toLocaleString()}</span> URLs</span>
        </label>
      `;
    }).join('');

    updateSummary();
  }

  function toggleDomain(domain, checkbox) {
    if (checkbox.checked) {
      enabledDomains.add(domain);
    } else {
      enabledDomains.delete(domain);
    }
    const label = document.getElementById('label-' + CSS.escape(domain));
    if (label) label.classList.toggle('active', checkbox.checked);
    updateFiltered();
    updateSummary();
  }

  function selectAll() {
    enabledDomains = new Set(Object.keys(domainMap));
    document.querySelectorAll('.domain-item input[type="checkbox"]').forEach(cb => {
      cb.checked = true;
      cb.closest('.domain-item').classList.add('active');
    });
    updateFiltered();
    updateSummary();
  }

  function selectNone() {
    enabledDomains.clear();
    document.querySelectorAll('.domain-item input[type="checkbox"]').forEach(cb => {
      cb.checked = false;
      cb.closest('.domain-item').classList.remove('active');
    });
    updateFiltered();
    updateSummary();
  }

  function updateFiltered() {
    filteredUrls = [];
    enabledDomains.forEach(domain => {
      if (domainMap[domain]) filteredUrls = filteredUrls.concat(domainMap[domain]);
    });

    const btn = document.getElementById('rollBtn');
    btn.disabled = filteredUrls.length === 0;
    btn.textContent = filteredUrls.length === 0 ? '⚠️ No domain selected' : '🎲 Roll Again';
  }

  function updateSummary() {
    const totalSelected = [...enabledDomains].reduce((acc, d) => acc + (domainMap[d]?.length || 0), 0);
    document.getElementById('filterSummary').innerHTML =
      `<span>${enabledDomains.size}</span> domain · <span>${totalSelected.toLocaleString()}</span> URLs aktif`;
  }

  function rollRandom() {
    if (!filteredUrls.length) return;
    rollCount++;
    const idx = Math.floor(Math.random() * filteredUrls.length);
    currentUrl = filteredUrls[idx];

    document.getElementById('rollNum').textContent = `Roll #${rollCount}`;
    document.getElementById('resultUrl').textContent = currentUrl;

    let domain = '';
    try { domain = new URL(currentUrl).hostname.replace(/^www\./, ''); } catch(_) {}
    document.getElementById('stats').innerHTML =
      `#<span>${(idx+1).toLocaleString()}</span> of <span>${filteredUrls.length.toLocaleString()}</span> · <span>${domain}</span>`;

    addHistory(currentUrl, rollCount);
  }

  function addHistory(url, num) {
    history.unshift({ url, num });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    show('historyCard');
    document.getElementById('historyList').innerHTML = history.map(h => `
      <div class="history-item">
        <a href="${h.url}" target="_blank">${h.url}</a>
        <span class="history-num">#${h.num}</span>
      </div>
    `).join('');
  }

  function clearHistory() {
    history = [];
    hide('historyCard');
  }

  function copyUrl() {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy URL', 1500);
    });
  }

  function openUrl() { if (currentUrl) window.open(currentUrl, '_blank'); }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  loadUrls();
</script>
</body>
</html>
